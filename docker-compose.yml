networks:
  otel-demo:
    driver: bridge

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: demodb
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./config/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - otel-demo

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - otel-demo

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./config/tempo-config.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - otel-demo

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./config/loki-config.yaml:/etc/loki/loki.yaml
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - otel-demo

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--enable-feature=exemplar-storage"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.retention.time=1d"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - otel-demo

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    networks:
      - otel-demo

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor tempoServiceGraph
    volumes:
      - ./config/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./config/grafana/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./config/grafana/dashboards/overview.json:/var/lib/grafana/dashboards/overview.json
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - otel-demo

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8080:8080"
    environment:
      OTEL_SERVICE_NAME: order-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_LOGS_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=demo,service.version=1.0.0"
      OTEL_INSTRUMENTATION_COMMON_PEER_SERVICE_MAPPING: "mysql:3306=mysql,redis:6379=redis"
      JAVA_TOOL_OPTIONS: "-javaagent:/app/opentelemetry-javaagent.jar"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - otel-demo

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "8081:8081"
    environment:
      OTEL_SERVICE_NAME: inventory-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_LOGS_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=demo,service.version=1.0.0"
      OTEL_INSTRUMENTATION_COMMON_PEER_SERVICE_MAPPING: "mysql:3306=mysql,redis:6379=redis"
      JAVA_TOOL_OPTIONS: "-javaagent:/app/opentelemetry-javaagent.jar"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - otel-demo

  load-generator:
    image: alpine/curl
    container_name: load-generator
    depends_on:
      order-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    restart: always
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting 15s for services to stabilize..."
        sleep 15
        echo "Starting continuous load generation..."
        while true; do
          # Query all orders
          curl -s http://order-service:8080/api/orders > /dev/null 2>&1

          # Query single order (trigger Redis cache hit/miss)
          ID=$$(shuf -i 1-5 -n 1)
          curl -s http://order-service:8080/api/orders/$$ID > /dev/null 2>&1

          # Query by user
          curl -s http://order-service:8080/api/orders/user/user-001 > /dev/null 2>&1

          # Create order (cross-service call + DB + Redis)
          SKU="SKU-00$$(shuf -i 1-4 -n 1)"
          QTY=$$(shuf -i 1-3 -n 1)
          curl -s -X POST http://order-service:8080/api/orders \
            -H "Content-Type: application/json" \
            -d "{\"userId\":\"user-$$(shuf -i 1-10 -n 1)\",\"sku\":\"$$SKU\",\"quantity\":$$QTY}" \
            > /dev/null 2>&1

          # Try to buy out-of-stock item (trigger 409)
          curl -s -X POST http://order-service:8080/api/orders \
            -H "Content-Type: application/json" \
            -d '{"userId":"user-999","sku":"SKU-005","quantity":1}' \
            > /dev/null 2>&1

          # Call slow endpoint
          curl -s http://order-service:8080/api/orders/slow > /dev/null 2>&1 &

          # Direct inventory queries
          curl -s http://inventory-service:8081/api/inventory > /dev/null 2>&1
          curl -s http://inventory-service:8081/api/inventory/SKU-001 > /dev/null 2>&1

          sleep 3
        done
    networks:
      - otel-demo
